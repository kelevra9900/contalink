version: '3.8'

services:
  # --- FRONTEND (NGINX + REACT STATIC) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - frontend_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Wget se usa porque la imagen base de nginx:alpine tiene wget instalado por defecto
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- BACKEND (FASTAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://developer:REPLACED_PASSWORD@localhost/testinvoices}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
    networks:
      - frontend_net
      - backend_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- REDIS (CACHE) ---
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- DATABASE (POSTGRESQL - SOLO DESARROLLO LOCAL) ---
  db:
    image: postgres:15-alpine
    profiles:
      - dev
    environment:
      - POSTGRES_USER=${DB_USER:-developer}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-REPLACED_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-testinvoices}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-developer} -d $${DB_NAME:-testinvoices}"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
